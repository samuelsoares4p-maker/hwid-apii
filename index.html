<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HWID Verification</title>
</head>
<body>
    <script>
        // Pega o HWID da URL
        const urlParams = new URLSearchParams(window.location.search);
        const hwid = urlParams.get('hwid');
        
        // Se nao tem HWID, retorna erro
        if (!hwid) {
            document.write('no_hwid');
        } else {
            // Busca o arquivo de dados
            fetch('hwid_data.json')
                .then(response => response.json())
                .then(data => {
                    // Verifica status do HWID
                    const status = data.hwids[hwid];
                    if (status) {
                        document.write(status);
                    } else {
                        document.write('active');
                    }
                })
                .catch(error => {
                    document.write('active');
                });
        }
    </script>
</body>
</html>
